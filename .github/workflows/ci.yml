name: CI

on:
  push:
  pull_request:

jobs:
  python-gates:
    name: Python (ruff + mypy + pytest + eval smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ruff mypy pytest pytest-cov pyyaml types-PyYAML

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Typecheck (mypy)
        run: mypy
        env:
          PYTHONPATH: src

      - name: Test + coverage gate (offline, mock LLM)
        run: pytest --cov --cov-report=term-missing
        env:
          PYTHONPATH: src

      - name: Eval harness smoke (golden set + self-play + A/B)
        run: python -m salesflow.eval.cli all --n 100
        env:
          PYTHONPATH: src

  # Catches JSX/SPA syntax errors before the Render multi-stage Docker build
  # would fail in production. Mirrors the frontend stage of the Dockerfile.
  frontend-build:
    name: React SPA build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci || npm install

      - name: Build SPA (vite)
        run: npm run build
